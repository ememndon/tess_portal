# Tess Portal, isolated compose project. Five containers, own volumes,
# own internal network. No container publishes a host port. Only
# tessportal-web joins the pre-existing external `edge` network, where
# Tess Console's Caddy reaches it by container name.
name: tessportal

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tessportal-web
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
      - edge
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      search:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 20s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: tessportal-worker
    restart: unless-stopped
    init: true
    env_file: .env
    volumes:
      - transformerscache:/app/.cache/transformers
    networks:
      - internal
      - egress
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 25s
    logging: *default-logging

  db:
    image: pgvector/pgvector:pg16
    container_name: tessportal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: tessportal-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  search:
    image: getmeili/meilisearch:v1.48.3
    container_name: tessportal-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7700/health || wget -qO- http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

networks:
  # private project network; no gateway to the outside world
  internal:
    internal: true
  # outbound-capable network for the worker (scrapers, feeds, backups)
  egress: {}
  # pre-existing shared network where Tess Console's Caddy lives
  edge:
    external: true

volumes:
  pgdata:
  redisdata:
  meilidata:
  transformerscache:
